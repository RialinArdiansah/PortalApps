# ═══════════════════════════════════════════════════════════════════
# OpenLiteSpeed Virtual Host Configuration — Portal Sertifikasi
# ═══════════════════════════════════════════════════════════════════
#
# Cara menggunakan template ini:
#
# OPSI 1: Via WebAdmin Console (http://server_ip:7080)
#   1. Buka Virtual Hosts > pilih vhost Anda (atau buat baru)
#   2. Tab "General":
#      - Document Root: /var/www/portal-sertifikasi/public
#      - Domain Name: yourdomain.com
#      - Index Files: index.php, index.html
#   3. Tab "Rewrite":
#      - Enable Rewrite: Yes
#      - Auto Load from .htaccess: Yes (opsional, OLS support .htaccess)
#      - Rewrite Rules: (paste rules di bawah)
#   4. Tab "Script Handler":
#      - Suffix: php
#      - Handler Type: LiteSpeed SAPI
#      - Handler Name: [sesuaikan dgn PHP handler yg tersedia]
#   5. Graceful Restart
#
# OPSI 2: Edit file conf langsung
#   Lokasi: /usr/local/lsws/conf/vhosts/<VHOST_NAME>/vhconf.conf
#   Lalu restart OLS: /usr/local/lsws/bin/lswsctrl restart
#
# ═══════════════════════════════════════════════════════════════════

# ── Virtual Host Settings ───────────────────────────────────────
# docRoot                 /var/www/portal-sertifikasi/public
# vhDomain                yourdomain.com
# vhAliases               www.yourdomain.com
# adminEmails             admin@yourdomain.com

# ── Index Files ─────────────────────────────────────────────────
# indexFiles              index.php, index.html

# ── Rewrite Rules ───────────────────────────────────────────────
# Paste ini ke Rewrite Rules di WebAdmin Console:
#
# RewriteEngine On
#
# # Serve existing files/directories directly
# RewriteCond %{REQUEST_FILENAME} !-f
# RewriteCond %{REQUEST_FILENAME} !-d
#
# # Route everything else to front controller
# RewriteRule ^ index.php [L,QSA]

# ── Context (Blocked Paths) ────────────────────────────────────
# Tambahkan Static Context di WebAdmin > Virtual Hosts > Context:
#
# URI:        /core/
# Accessible: No
#
# URI:        /controllers/
# Accessible: No
#
# URI:        /models/
# Accessible: No
#
# URI:        /views/
# Accessible: No
#
# URI:        /database/
# Accessible: No
#
# URI:        /storage/
# Accessible: No
#
# URI:        /vendor/
# Accessible: No

# ── PHP Handler ─────────────────────────────────────────────────
# scripthandler {
#   add lsapi:lsphp82 php
# }
#
# Sesuaikan 'lsphp82' dengan versi PHP yang terinstall di server.
# Cek dengan: ls /usr/local/lsws/lsphp*/bin/lsphp

# ── Security Headers (jika tidak menggunakan .htaccess) ─────────
# module headers {
#   X-Content-Type-Options    nosniff
#   X-Frame-Options           SAMEORIGIN
#   X-XSS-Protection          1; mode=block
#   Referrer-Policy            strict-origin-when-cross-origin
# }

# ── GZIP Compression ───────────────────────────────────────────
# OLS enables GZIP by default. Pengaturan via WebAdmin:
#   Server > Tuning > GZIP Compression:
#     Enable Compression: Yes
#     Compressible Types: text/html, text/css, application/javascript,
#                         application/json, image/svg+xml, text/xml
